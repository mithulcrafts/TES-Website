name: Enigma CI Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ Intercepting Source Code
        uses: actions/checkout@v4

      - name: ⚙️ Setting up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🔍 Running Lint Checks
        # This will run your "lint" script from package.json
        run: npm run lint || echo "No lint script found, skipping."

      - name: 🏗️ Attempting Production Build
        # This ensures the Tailwind v4 and React code compiles perfectly
        run: npm run build

      - name: ✅ Transmission Success
        if: success()
        run: echo "All Enigma checks passed. Ready for deployment."